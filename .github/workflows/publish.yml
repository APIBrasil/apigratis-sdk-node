name: Publish

# Publica no npm quando uma release é criada no GitHub.
# Requer o secret NPM_TOKEN (npm access token com permissão de publish).
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # provenance do npm

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Instalar dependências
        run: npm ci

      - name: Testes
        run: npm test

      - name: Build
        run: npm run build

      - name: Publicar no npm (com provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
